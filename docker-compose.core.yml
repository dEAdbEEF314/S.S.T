services:
  prefect-server:
    image: prefecthq/prefect:3.6.26-python3.12
    container_name: sst-prefect-server
    command: prefect server start
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_URL=${PREFECT_API_URL:-http://localhost:4200/api}
      - PREFECT_API_DATABASE_TIMEOUT=60
      - PREFECT_API_DATABASE_SQLITE_PRAGMAS={"journal_mode":"WAL","synchronous":"NORMAL"}
    volumes:
      - prefect_data:/root/.prefect
    network_mode: bridge

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sst-core
    depends_on:
      - prefect-server
    volumes:
      - ./.env.core:/app/.env:ro
      - ./core/src/core:/app/src/core:ro
    environment:
      - PREFECT_API_URL=${PREFECT_API_URL:-http://localhost:4200/api}
      - PYTHONPATH=/app/src
    network_mode: bridge

volumes:
  prefect_data:
