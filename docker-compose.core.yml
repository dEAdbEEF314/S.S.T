version: '3.8'
services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: sst-prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_URL=${PREFECT_API_URL:-http://localhost:4200/api}
    network_mode: bridge

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sst-core
    depends_on:
      - prefect-server
    volumes:
      - ./.env.core:/app/.env:ro
      - ./core/src/core:/app/src/core:ro
    environment:
      - PREFECT_API_URL=${PREFECT_API_URL:-http://localhost:4200/api}
      - PYTHONPATH=/app/src
    network_mode: bridge
