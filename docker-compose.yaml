services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: sst-ui
    env_file:
      - .env.ui
    ports:
      - "8000:8000"
    volumes:
      - ./.env.ui:/app/.env:ro
      - ./ui/src/ui:/app/src/ui:ro
      - ./ui/frontend/dist:/app/frontend/dist:ro
    environment:
      - PYTHONPATH=/app/src
      - TZ=${TZ:-Asia/Tokyo}
    networks:
      - sst-network

networks:
  sst-network:
    external: true
