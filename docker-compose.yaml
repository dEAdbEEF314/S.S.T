services:
  scout:
    build:
      context: ./scout
      dockerfile: Dockerfile
    container_name: sst-scout
    volumes:
      - ${STEAM_LIBRARY_PATH}:/steam_library:ro
      - ./.env:/app/.env:ro
      - ./scout/src/scout:/app/src/scout:ro
    environment:
      - STEAM_LIBRARY_PATH=/steam_library
      - PYTHONPATH=/app/src
    networks:
      - sst-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: sst-worker
    volumes:
      - ./.env:/app/.env:ro
      - ./worker/src/worker:/app/src/worker:ro
      - ./scout/src/scout:/app/src/scout:ro  # Worker needs Scout models
    environment:
      - PYTHONPATH=/app/src
    networks:
      - sst-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sst-core
    volumes:
      - ./.env:/app/.env:ro
      - ./core/src/core:/app/src/core:ro
      - ./scout/src/scout:/app/src/scout:ro   # Core needs Scout models
      - ./worker/src/worker:/app/src/worker:ro # Core needs Worker logic
    environment:
      - PREFECT_API_URL=${PREFECT_API_URL:-http://localhost:4200/api}
      - PYTHONPATH=/app/src
    depends_on:
      - scout
      - worker
    networks:
      - sst-network

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: sst-ui
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./ui/src/ui:/app/src/ui:ro
    environment:
      - PYTHONPATH=/app/src
    networks:
      - sst-network

networks:
  sst-network:
    driver: bridge
