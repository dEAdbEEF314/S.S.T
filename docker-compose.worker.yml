services:
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: sst-worker
    volumes:
      - ./.env.worker:/app/.env:ro
      - ./worker/src/worker:/app/src/worker:ro
    environment:
      - PYTHONPATH=/app/src
      - TZ=${TZ:-Asia/Tokyo}
      - PREFECT_API_URL=http://prefect.outergods.lan/api
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "prefect.outergods.lan:192.168.11.205"
      - "swfs-s3.outergods.lan:192.168.11.205"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    command: ["uv", "run", "-m", "worker.main"]
    restart: always

networks:
  default:
    name: sst-network
    external: true
