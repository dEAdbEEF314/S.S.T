services:
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: sst-worker
    volumes:
      - ./.env.worker:/app/.env:ro
      - ./worker/src/worker:/app/src/worker:ro
    environment:
      - PYTHONPATH=/app/src
      - TZ=${TZ:-Asia/Tokyo}
      - PREFECT_API_URL=http://sst-prefect-server:4200/api
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # Worker runs as a long-lived Prefect worker process
    # Command is overridden in the Dockerfile or here.
